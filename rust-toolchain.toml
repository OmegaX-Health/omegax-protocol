# Pin the Rust toolchain so local rustfmt/clippy match what CI installs.
# Bumped intentionally — coordinate any change with .github/workflows/ci.yml
# .github/workflows/localnet-e2e.yml, and .github/workflows/qedgen-verify.yml,
# which install the same version.
[toolchain]
channel = "1.89.0"
components = ["rustfmt", "clippy"]
profile = "minimal"
