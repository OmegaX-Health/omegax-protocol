name: QEDGen Verify

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: qedgen-verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  qedgen:
    runs-on: ubuntu-latest
    timeout-minutes: 75
    env:
      QEDGEN_REF: v2.16.0
      KANI_VERSION: 0.67.0
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          fetch-depth: 0

      - name: Detect QEDGen-relevant changes
        id: qedgen_changes
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          changed="$(git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}")"
          if printf '%s\n' "$changed" | grep -Eq '^(\.qed/|formal_verification/|omegax_protocol\.qedspec|programs/omegax_protocol/src/|programs/omegax_protocol/Cargo\.toml|programs/omegax_private_claim_review/|idl/omegax_private_claim_review\.json|scripts/(run_qedgen|check_private_claim_review_qedgen)\.mjs|Anchor\.toml|Cargo\.(toml|lock)|package(-lock)?\.json|\.github/workflows/qedgen-verify\.yml)'; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
          else
            echo "relevant=false" >> "$GITHUB_OUTPUT"
          fi

      - name: No-op for non-protocol changes
        if: steps.qedgen_changes.outputs.relevant != 'true'
        run: echo "No QEDGen-relevant changes in this pull request."

      - name: Free hosted runner disk
        if: steps.qedgen_changes.outputs.relevant == 'true'
        shell: bash
        run: |
          set -euo pipefail
          df -h
          sudo rm -rf \
            /usr/share/dotnet \
            /usr/local/lib/android \
            /usr/local/.ghcup \
            /opt/ghc \
            /opt/hostedtoolcache/CodeQL
          docker system prune -af || true
          df -h

      - name: Setup Node.js
        if: steps.qedgen_changes.outputs.relevant == 'true'
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Rust
        if: steps.qedgen_changes.outputs.relevant == 'true'
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: 1.89.0

      - name: Install Lean
        if: steps.qedgen_changes.outputs.relevant == 'true'
        shell: bash
        run: |
          set -euo pipefail
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh -s -- -y
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
          "$HOME/.elan/bin/lean" --version
          "$HOME/.elan/bin/lake" --version

      - name: Install Kani
        if: steps.qedgen_changes.outputs.relevant == 'true'
        shell: bash
        run: |
          set -euo pipefail
          cargo install --locked kani-verifier --version "${KANI_VERSION}"
          cargo kani setup

      - name: Install QEDGen
        if: steps.qedgen_changes.outputs.relevant == 'true'
        shell: bash
        run: |
          set -euo pipefail
          git clone --branch "${QEDGEN_REF}" --depth 1 https://github.com/QEDGen/solana-skills.git /tmp/qedgen-solana-skills
          bash /tmp/qedgen-solana-skills/install.sh
          echo "QEDGEN=/tmp/qedgen-solana-skills/bin/qedgen" >> "$GITHUB_ENV"

      - name: Setup QEDGen mathlib
        if: steps.qedgen_changes.outputs.relevant == 'true'
        run: |
          "$QEDGEN" setup --mathlib

      - name: Check spec
        if: steps.qedgen_changes.outputs.relevant == 'true'
        run: npm run qedgen:check

      - name: Check MagicBlock adjunct spec
        if: steps.qedgen_changes.outputs.relevant == 'true'
        run: npm run qedgen:check:private-claim-review

      - name: Regenerate verification artifacts
        if: steps.qedgen_changes.outputs.relevant == 'true'
        run: npm run qedgen:codegen

      - name: Fail on generated drift
        if: steps.qedgen_changes.outputs.relevant == 'true'
        shell: bash
        run: |
          set -euo pipefail
          git diff --exit-code -- \
            omegax_protocol.qedspec \
            formal_verification

      - name: Run generated backends
        if: steps.qedgen_changes.outputs.relevant == 'true'
        run: npm run qedgen:verify

      - name: Reconcile spec, code, and proofs
        if: steps.qedgen_changes.outputs.relevant == 'true'
        run: npm run qedgen:reconcile
